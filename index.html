<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nature Scroll Experience</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SKY + CLOUDS -->
  <div class="sky"></div>
  <div class="clouds"></div>

  <!-- TREE LAYERS -->
  <div class="trees-layer back"></div>
  <div class="trees-layer mid"></div>
  <div class="trees-layer front"></div>

  <!-- HERO -->
  <header class="hero">
    <h1 class="title">Nature Experience</h1>
    <p class="subtitle">Scroll pour entrer dans la prairie</p>
  </header>

  <!-- SECTIONS -->
  <section class="section forest">
    <h2>La Clairière</h2>
    <p>Un espace calme, entouré d’arbres et de lumière douce.</p>
  </section>

  <section class="section grassland">
    <h2>La Prairie</h2>
    <p>Une mer d’herbes hautes, ondulant sous le vent.</p>
  </section>

  <section class="section horizon">
    <h2>L’Horizon</h2>
    <p>Le ciel s’ouvre, les nuages se déplacent lentement.</p>
  </section>

  <footer class="footer">
    <p>© 2026 Nature Scroll Experience</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
